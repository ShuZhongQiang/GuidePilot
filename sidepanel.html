<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuidePilot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sidepanel-body">
  <div class="sidepanel-container">
    <div id="home-view" class="panel-view panel-view--active">
      <div class="sidepanel-header">
        <h1>GuidePilot</h1>
        <button id="open-ai-config" class="icon-btn settings-btn" type="button" title="AI 配置">
          <img src="icons/settings.svg" alt="设置" class="icon-img">
        </button>
      </div>

      <div class="record-area">
        <button id="start-record" class="record-main-btn">
          <svg class="record-play-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <polygon points="10,8 16,12 10,16" fill="currentColor"/>
          </svg>
          <span>开 始</span>
        </button>
        <button id="stop-record" class="stop-main-btn hidden" disabled>
          <svg class="record-stop-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <rect x="8" y="8" width="8" height="8" fill="currentColor"/>
          </svg>
          <span>停 止</span>
        </button>
      </div>

      <div class="mode-bar">
        <div class="mode-toggle-left">
          <span class="mode-text">自动</span>
          <label class="switch">
            <input type="checkbox" id="auto-mode-toggle" checked>
            <span class="slider"></span>
          </label>
          <span class="mode-hint">点击后自动截图并保存</span>
        </div>
        <div class="status-right">
          <span id="recording-dot" class="status-dot-green"></span>
          <span id="status-text" class="status-text-small">就绪</span>
        </div>
      </div>

      <div class="steps-area">
        <div class="steps-header">
          <h2>步骤</h2>
          <button id="clear-steps" class="clear-btn" title="清空所有步骤">
            <img src="icons/trash.svg" alt="清空" class="icon-img-small">
          </button>
        </div>
        <div id="steps-container" class="steps-container">
          <div class="empty-state">
            <img src="icons/photo.svg" alt="无步骤" class="empty-icon">
            <p>暂无步骤记录</p>
            <span class="empty-hint">点击"开始"捕捉操作步骤</span>
          </div>
        </div>
      </div>

      <div class="bottom-bar">
        <button id="ai-generate" class="ai-pill-btn" type="button">
          AI生成
        </button>
        <div class="export-group">
          <span class="export-label">导出</span>
          <button id="export-html" class="export-icon-btn" type="button" title="导出HTML">
            <img src="icons/html.svg" alt="HTML">
          </button>
          <button id="export-markdown" class="export-icon-btn" type="button" title="导出Markdown">
            <img src="icons/markdown.svg" alt="Markdown">
          </button>
          <button id="export-json" class="export-icon-btn" type="button" title="导出JSON">
            <img src="icons/json.svg" alt="JSON">
          </button>
        </div>
      </div>
    </div>

    <div id="ai-generate-view" class="panel-view">
      <div class="subpage-header">
        <button id="back-from-ai-generate" class="neo-btn neo-btn-sm" type="button">返回</button>
        <div>
          <h2>AI 生成</h2>
          <p>输入你希望 AI 如何整理当前步骤文档。</p>
        </div>
      </div>

      <div class="ai-page-card">
        <label for="ai-prompt" class="ai-form-label">提示词</label>
        <textarea id="ai-prompt" class="ai-input ai-textarea" rows="8" placeholder="例如：请把步骤整理成面向新用户的操作手册，语气简洁，按业务目标分段。"></textarea>
        <div class="ai-page-actions">
          <button id="ai-generate-confirm" class="neo-btn neo-btn-primary" type="button">确认生成</button>
          <button id="ai-generate-cancel" class="neo-btn" type="button">取消</button>
        </div>
        <p class="ai-page-note">生成结果会以 Markdown 文档打包下载，当前步骤截图会一起导出。</p>
      </div>
    </div>

    <div id="ai-config-view" class="panel-view">
      <div class="subpage-header">
        <button id="back-from-ai-config" class="neo-btn neo-btn-sm" type="button">返回</button>
        <div>
          <h2>AI 配置</h2>
          <p>配置 OpenAI 兼容接口，保存后用于 AI 生成。</p>
        </div>
      </div>

      <div class="ai-page-card">
        <div class="ai-config-form">
          <div class="ai-form-group">
            <label for="ai-api-key" class="ai-form-label">API Key</label>
            <input type="password" id="ai-api-key" class="ai-input" placeholder="sk-..." autocomplete="off">
          </div>
          <div class="ai-form-group">
            <label for="ai-endpoint" class="ai-form-label">Endpoint</label>
            <input type="text" id="ai-endpoint" class="ai-input" placeholder="https://api.openai.com/v1/chat/completions">
          </div>
          <div class="ai-form-group">
            <label for="ai-model" class="ai-form-label">Model</label>
            <input type="text" id="ai-model" class="ai-input" placeholder="gpt-4.1-mini">
          </div>
          <div class="ai-form-group">
            <label for="ai-language" class="ai-form-label">语言</label>
            <select id="ai-language" class="ai-input">
              <option value="zh-CN">简体中文</option>
              <option value="zh-TW">繁體中文</option>
              <option value="en-US">English</option>
              <option value="ja-JP">日本語</option>
            </select>
          </div>
          <button id="ai-save-config" class="neo-btn neo-btn-primary" type="button">保存配置</button>
        </div>
      </div>
    </div>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script src="shared/constants.js"></script>
  <script src="shared/message-types.js"></script>
  <script src="sidepanel/panel-client.js"></script>
  <script src="sidepanel/state-store.js"></script>
  <script src="sidepanel/step-list-view.js"></script>
  <script src="sidepanel/export-controller.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
